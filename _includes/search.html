{% assign current_lang = page.lang | default: "en" %}

<div class="search-container"
     data-search-scope="writings"
     data-search-lang="{{ current_lang }}">
    <label class="search-field" for="search-input">
        <i class="fas fa-search search-icon" aria-hidden="true"></i>
        {% if page.lang == "az" %}
          <input type="search" id="search-input"
            class="search-input" placeholder="Yazılarda axtar..." autocomplete="off">
        {% else %}
          <input type="search" id="search-input"
            class="search-input" placeholder="Search writings..." autocomplete="off">
        {% endif %}
    </label>
    <ul id="results-container" class="results-list"></ul>
</div>

<style>
    .search-container {
        margin: 0.75em 0 0.5em;
    }

    .search-field {
        display: flex;
        align-items: center;
        gap: 0.5em;
        width: 100%;
        box-sizing: border-box;
        padding: 8px 12px;
        border: 1px solid #e0e0e0;
        border-radius: 4px;
        background-color: #fff;
        transition: border-color 0.15s ease;
    }

    .search-field:focus-within {
        border-color: #556a9a;
    }

    .search-icon {
        flex-shrink: 0;
        font-size: 0.85rem;
        color: #6c757d;
    }

    .search-input {
        width: 100%;
        padding: 0;
        font-size: 0.9rem;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        border: none;
        outline: none;
        background: transparent;
        color: #1a1a1a;
    }

    .search-input::placeholder {
        color: #9aa0a6;
    }

    .search-input::-webkit-search-cancel-button {
        cursor: pointer;
    }

    .results-list {
        list-style: none;
        margin: 0.5em 0 0;
        padding: 0;
    }

    .results-list li {
        padding: 0.35em 0;
        border-bottom: 1px solid #eee;
        transition: color 0.15s ease;
    }

    .results-list li:last-child {
        border-bottom: none;
    }

    .results-list li a {
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
        color: #2c3e50;
    }

    .results-list li a:hover {
        color: #556a9a;
    }

    .no-results {
        font-size: 0.9rem;
        color: #6c757d;
        padding: 0.35em 0;
    }
</style>

<script>
  (function () {
    if (document.querySelector(".writings-hub")) return;

    var container = document.querySelector(".search-container");
    if (!container) return;

    var scope = container.getAttribute("data-search-scope") || "writings";
    var lang = container.getAttribute("data-search-lang") || "en";
    var searchInput = document.getElementById("search-input");
    var resultsContainer = document.getElementById("results-container");

    if (!searchInput || !resultsContainer || typeof SimpleJekyllSearch === "undefined") {
      return;
    }

    fetch("/search.json")
      .then(function (response) {
        return response.json();
      })
      .then(function (data) {
        var filtered = data.filter(function (item) {
          if (lang === "az" && item.type === "note") return false;
          if (item.lang && item.lang !== lang) return false;
          if (scope === "writings") return item.type === "writing";
          if (scope === "notes") return item.type === "note";
          return true;
        });

        SimpleJekyllSearch({
          searchInput: searchInput,
          resultsContainer: resultsContainer,
          json: filtered
        });
      })
      .catch(function () {});
  })();
</script>
