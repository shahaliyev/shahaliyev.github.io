<div class="search-container">
    <label class="search-field" for="search-input">
        <i class="fas fa-search search-icon" aria-hidden="true"></i>
        {% if page.lang == "en" %}
            <input type="search" id="search-input"
            class="search-input" placeholder="Search writings..." autocomplete="off">
        {% elsif page.lang == "az" %}
            <input type="search" id="search-input"
            class="search-input" placeholder="Yazılarda axtar..." autocomplete="off">
        {% endif %}
    </label>
    <ul id="results-container" class="results-list"></ul>
</div>

<style>
    .search-container {
        margin: 0.75em 0 0.5em;
    }

    .search-field {
        display: flex;
        align-items: center;
        gap: 0.5em;
        width: 100%;
        box-sizing: border-box;
        padding: 8px 12px;
        border: 1px solid #e0e0e0;
        border-radius: 4px;
        background-color: #fff;
        transition: border-color 0.15s ease;
    }

    .search-field:focus-within {
        border-color: #556a9a;
    }

    .search-icon {
        flex-shrink: 0;
        font-size: 0.85rem;
        color: #6c757d;
    }

    .search-input {
        width: 100%;
        padding: 0;
        font-size: 0.9rem;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        border: none;
        outline: none;
        background: transparent;
        color: #1a1a1a;
    }

    .search-input::placeholder {
        color: #9aa0a6;
    }

    .search-input::-webkit-search-cancel-button {
        cursor: pointer;
    }

    .results-list {
        list-style: none;
        margin: 0.5em 0 0;
        padding: 0;
    }

    .results-list li {
        padding: 0.35em 0;
        border-bottom: 1px solid #eee;
        transition: color 0.15s ease;
    }

    .results-list li:last-child {
        border-bottom: none;
    }

    .results-list li a {
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
        color: #2c3e50;
    }

    .results-list li a:hover {
        color: #556a9a;
    }

    .no-results {
        font-size: 0.9rem;
        color: #6c757d;
        padding: 0.35em 0;
    }
</style>


<script>
    let sjs = SimpleJekyllSearch({
      searchInput: document.getElementById('search-input'),
      resultsContainer: document.getElementById('results-container'),
      json: '/search.json'
    })
  </script>
